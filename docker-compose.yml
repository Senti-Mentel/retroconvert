version: "3.9"

services:
  retroconvert:
    build: .
    container_name: retroconvert
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - /mnt/lxc_shares/nas_rwx/Storage/MassStorage/RetroConvertTest/Roms:/roms
      - retroconvert_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  retroconvert_data:
